<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="herald_icon_180.png">
  <link rel="manifest" href="manifest.json">
  <title>HERALD — Personal AI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --emerald:#1A9B8A;--teal:#3ECFBA;--sand-2:#FDFAF4;--deep-2:#0a1e2e;--deep-3:#0e2a3d;
      --muted:#4a8aaa;--text-d:#d0eaf4;--text-l:#0B4F6C;--border-d:rgba(42,90,120,0.3);--border-l:rgba(26,155,138,0.2);
      --card-d:rgba(14,42,61,0.9);--card-l:rgba(255,255,255,0.9);--transition:0.3s ease;
    }
    [data-theme="dark"]{--bg:var(--deep-2);--bg2:var(--deep-3);--txt:var(--text-d);--txt2:var(--muted);--bdr:var(--border-d);--card:var(--card-d);--chip-bg:rgba(14,42,61,0.8);--chip-txt:#5aaac8;}
    [data-theme="light"]{--bg:var(--sand-2);--bg2:white;--txt:var(--text-l);--txt2:#5aacbc;--bdr:var(--border-l);--card:var(--card-l);--chip-bg:white;--chip-txt:var(--emerald);}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;height:100dvh;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow:hidden;position:fixed;width:100%;transition:background var(--transition),color var(--transition);}

    .setup{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;text-align:center;}
    .setup-icon{width:72px;height:72px;border-radius:20px;background:var(--emerald);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-family:'DM Serif Display',serif;font-size:36px;color:white;}
    .setup-title{font-family:'DM Serif Display',serif;font-size:32px;color:var(--emerald);letter-spacing:0.12em;margin-bottom:6px;}
    .setup-sub{font-size:13px;color:var(--txt2);margin-bottom:40px;line-height:1.6;font-weight:300;}
    .setup-input{width:100%;max-width:340px;background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:14px 18px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;margin-bottom:12px;}
    .setup-input:focus{border-color:var(--emerald);}
    .setup-input::placeholder{color:var(--txt2);opacity:0.6;}
    .setup-btn{width:100%;max-width:340px;padding:15px;background:var(--emerald);color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.1em;border:none;border-radius:12px;cursor:pointer;}
    .setup-error{font-size:12px;color:#e05a5a;margin-top:12px;min-height:16px;font-weight:300;}
    .setup-note{font-size:11px;color:var(--txt2);margin-top:20px;line-height:1.7;max-width:300px;font-weight:300;opacity:0.7;}

    .onboard{position:fixed;inset:0;z-index:90;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;overflow-y:auto;}
    .onboard-msg{font-size:20px;color:var(--txt);line-height:1.7;max-width:320px;margin-bottom:8px;font-weight:300;font-style:italic;}
    .onboard-sub{font-size:12px;color:var(--txt2);line-height:1.6;max-width:300px;margin-bottom:24px;font-weight:300;min-height:18px;}
    .onboard-input{width:100%;max-width:320px;background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:14px 18px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;margin-bottom:12px;}
    .onboard-input:focus{border-color:var(--emerald);}
    .onboard-options{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:340px;margin-bottom:20px;}
    .onboard-opt{padding:11px 20px;border:1px solid var(--bdr);border-radius:24px;background:var(--bg2);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s;}
    .onboard-opt.selected{background:var(--emerald);color:white;border-color:var(--emerald);}
    .onboard-btn{width:100%;max-width:320px;padding:14px;background:var(--emerald);color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.1em;border:none;border-radius:12px;cursor:pointer;}
    .onboard-skip{font-size:11px;color:var(--txt2);margin-top:14px;cursor:pointer;text-decoration:underline;opacity:0.6;}
    .onboard-dots{display:flex;gap:6px;margin-bottom:28px;}
    .onboard-dot{width:6px;height:6px;border-radius:50%;background:var(--bdr);transition:background 0.2s;}
    .onboard-dot.active{background:var(--emerald);}
    .onboard-dot.done{background:var(--emerald);opacity:0.4;}

    .app{height:100%;height:100dvh;display:flex;flex-direction:column;max-width:680px;margin:0 auto;}
    .header{flex-shrink:0;padding:12px 20px 10px;border-bottom:0.5px solid var(--bdr);background:var(--bg);display:flex;align-items:center;gap:12px;}
    .h-icon{width:32px;height:32px;border-radius:9px;background:var(--emerald);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;color:white;flex-shrink:0;}
    .h-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--emerald);letter-spacing:0.1em;}
    .h-sub{font-size:9px;color:var(--txt2);letter-spacing:0.12em;text-transform:uppercase;font-weight:300;}
    .h-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .h-time{font-size:11px;color:var(--txt2);}
    .icon-btn{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--bdr);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
    .icon-btn svg{width:14px;height:14px;}
    .icon-btn:active{transform:scale(0.9);}
    .icon-btn.muted{opacity:0.4;}
    .dot-live{width:6px;height:6px;border-radius:50%;background:var(--emerald);animation:pulse 2.5s infinite;transition:background 0.4s;}
    .dot-live.cold{background:#c8a84b;animation:pulse 0.8s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

    .messages{flex:1;overflow-y:auto;padding:20px 20px 8px;display:flex;flex-direction:column;gap:18px;-webkit-overflow-scrolling:touch;}
    .messages::-webkit-scrollbar{display:none;}
    .msg{display:flex;flex-direction:column;gap:4px;animation:fadeIn 0.25s ease;}
    .msg.user{align-items:flex-end;}
    .msg.herald{align-items:flex-start;width:100%;}
    .msg-label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--txt2);padding:0 4px;font-weight:300;}
    .msg.herald .msg-label{color:var(--emerald);opacity:0.6;}
    .msg.user .msg-bubble{max-width:78%;padding:10px 14px;font-size:14px;line-height:1.6;border-radius:16px;border-bottom-right-radius:4px;font-weight:400;background:var(--emerald);color:white;}
    .msg.herald .msg-bubble{background:transparent;border:none;padding:2px 0;color:var(--txt);font-size:15px;line-height:1.7;font-weight:300;width:100%;max-width:100%;letter-spacing:0.01em;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

    .stream-cursor{display:inline-block;width:2px;height:14px;background:var(--emerald);margin-left:2px;animation:blink 0.8s infinite;vertical-align:middle;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    .action-card{display:flex;align-items:center;gap:14px;margin-top:14px;padding:13px 16px;background:var(--bg2);border:0.5px solid var(--bdr);border-radius:16px;cursor:pointer;text-decoration:none;transition:transform 0.12s,opacity 0.12s;width:100%;max-width:300px;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 8px rgba(0,0,0,0.12);}
    .action-card:active{transform:scale(0.97);opacity:0.8;}
    .action-card-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
    .action-card-body{flex:1;min-width:0;}
    .action-card-title{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .action-card-sub{font-size:11px;color:var(--txt2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .action-card-arrow{font-size:18px;color:var(--txt2);flex-shrink:0;opacity:0.5;font-weight:300;}
    .search-cards{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
    .search-card{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:12px;font-size:12px;font-weight:500;color:white;cursor:pointer;text-decoration:none;border:none;transition:opacity 0.12s;}
    .search-card:active{opacity:0.75;}

    .thinking{display:flex;align-items:center;gap:8px;padding:6px 0;}
    .thinking-label{font-size:11px;color:var(--txt2);font-weight:300;font-style:italic;}
    .dots{display:flex;gap:3px;}
    .dots span{width:4px;height:4px;border-radius:50%;background:var(--emerald);opacity:0.6;animation:bounce 1.2s infinite;}
    .dots span:nth-child(2){animation-delay:0.2s;}.dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px);opacity:1}}

    .welcome{text-align:center;padding:32px 20px;animation:fadeIn 0.4s ease;}
    .welcome-icon{width:56px;height:56px;border-radius:16px;background:var(--emerald);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'DM Serif Display',serif;font-size:28px;color:white;}
    .welcome-title{font-family:'DM Serif Display',serif;font-size:15px;color:var(--emerald);letter-spacing:0.12em;margin-bottom:8px;}
    .welcome-text{font-size:13px;color:var(--txt2);line-height:1.7;margin-bottom:24px;font-weight:300;font-style:italic;}
    .quick-cmds{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
    .q-btn{padding:7px 14px;border:0.5px solid var(--bdr);border-radius:20px;font-size:11px;color:var(--chip-txt);cursor:pointer;background:var(--chip-bg);font-family:'DM Sans',sans-serif;}
    .chips{display:flex;gap:8px;padding:0 20px 12px;justify-content:center;flex-wrap:wrap;}
    .chip{background:var(--chip-bg);border:0.5px solid var(--bdr);border-radius:20px;padding:7px 14px;font-size:11px;color:var(--chip-txt);cursor:pointer;font-weight:400;white-space:nowrap;}

    .mic-zone{flex-shrink:0;padding:10px 20px 16px;border-top:0.5px solid var(--bdr);background:var(--bg);display:flex;flex-direction:column;align-items:stretch;gap:8px;}
    .mic-row{display:flex;align-items:center;gap:14px;justify-content:center;}
    .mic-btn{width:64px;height:64px;border-radius:50%;background:var(--emerald);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .mic-btn svg{width:26px;height:26px;}
    .mic-btn.on{background:var(--teal);animation:micpulse 1.5s infinite;}
    @keyframes micpulse{0%,100%{box-shadow:0 0 0 6px rgba(62,207,186,0.12)}50%{box-shadow:0 0 0 14px rgba(62,207,186,0.04)}}
    .text-input{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:20px;padding:10px 16px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.4;resize:none;outline:none;width:100%;max-height:160px;min-height:40px;}
    .text-input:focus{border-color:var(--emerald);}
    .text-input::placeholder{color:var(--txt2);opacity:0.6;font-style:italic;}
    .send-btn{width:40px;height:40px;border-radius:50%;border:0.5px solid var(--bdr);background:var(--bg2);color:var(--emerald);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .send-btn svg{width:16px;height:16px;}
    .voice-hint{font-size:10px;color:var(--txt2);text-align:center;min-height:14px;font-weight:300;letter-spacing:0.06em;}
    .footer{text-align:center;padding:4px 20px 6px;font-size:9px;color:var(--txt2);font-weight:300;opacity:0.5;flex-shrink:0;}

    .trial-wall{position:fixed;inset:0;z-index:300;background:rgba(10,30,46,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;animation:fadeIn 0.4s ease;}
    .trial-icon{width:64px;height:64px;border-radius:18px;background:var(--emerald);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:32px;color:white;margin:0 auto 24px;}
    .trial-msg{font-size:16px;color:var(--txt);line-height:1.8;max-width:320px;margin-bottom:28px;font-weight:300;font-style:italic;}
    .trial-btn{width:100%;max-width:320px;padding:16px;background:var(--emerald);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:10px;letter-spacing:0.05em;}
    .trial-secondary{font-size:12px;color:var(--txt2);max-width:300px;line-height:1.6;font-weight:300;margin-top:8px;}
    .trial-warning{background:rgba(26,155,138,0.12);border-top:0.5px solid rgba(26,155,138,0.3);padding:10px 20px;text-align:center;font-size:12px;color:#3ECFBA;flex-shrink:0;cursor:pointer;}
  </style>
</head>
<body data-theme="dark">

<!-- SETUP SCREEN -->
<div class="setup" id="setupScreen">
  <div class="setup-icon">H</div>
  <div class="setup-title">HERALD</div>
  <div class="setup-sub">Your personal AI — always on, always ready.</div>
  <input class="setup-input" id="codeInput" type="text" value="miked2026" placeholder="Enter your access code..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" onkeydown="if(event.key==='Enter')submitCode()"/>
  <button class="setup-btn" onclick="submitCode()">GET STARTED</button>
  <div class="setup-error" id="setupError"></div>
  <div class="setup-note" id="debugInfo">Backend is healthy — tap GET STARTED</div>
</div>

<!-- ONBOARDING -->
<div class="onboard" id="onboardScreen" style="display:none;">
  <div class="onboard-dots" id="onboardDots"></div>
  <div class="onboard-msg" id="onboardMsg"></div>
  <div class="onboard-sub" id="onboardSub"></div>
  <div id="onboardInputArea"></div>
  <button class="onboard-btn" onclick="nextOnboard()">Continue</button>
  <div class="onboard-skip" onclick="skipOnboard()">skip for now</div>
</div>

<!-- MAIN APP -->
<div class="app" id="appScreen" style="display:none;">
  <!-- Header, messages, chips, mic-zone, footer — exact same as your original v54.4 -->
  <div class="header"> ... (your original header) ... </div>
  <div class="messages" id="messages"> ... (your original welcome) ... </div>
  <!-- (All other sections from your original file) -->
</div>

<!-- TRIAL WALL -->
<div class="trial-wall" id="trialWall" style="display:none;">
  <!-- your original trial wall -->
</div>

<script>
// HERALD v55.1 — Full stable version
const RAILWAY_URL = 'https://web-production-b4083.up.railway.app';
const VERSION = 'V55.1';

let userId = localStorage.getItem('herald_uid') || '';
let authCode = localStorage.getItem('herald_auth') || '';
let aiName = localStorage.getItem('herald_ai_name') || 'Herald';
let userName = localStorage.getItem('herald_name') || '';
let isOwner = localStorage.getItem('herald_owner') === 'true';
let history = [];
let isStreaming = false;
let muted = localStorage.getItem('herald_muted') === 'true';
let recognition = null;
let micActive = false;
let currentAudio = null;
let onboardStep = 0;
let onboardData = {};
let currentTheme = localStorage.getItem('herald_theme') || 'dark';
let watchdogTimer = null;

document.body.setAttribute('data-theme', currentTheme);
updateTime();
setInterval(updateTime, 30000);
setInterval(() => fetch(RAILWAY_URL + '/health').catch(()=>{}), 180000);

if (userId && authCode) showApp();

async function submitCode() {
  const code = document.getElementById('codeInput').value.trim();
  const errEl = document.getElementById('setupError');
  const debugEl = document.getElementById('debugInfo');
  errEl.textContent = '';
  debugEl.textContent = 'Connecting to Herald...';

  if (!userId) userId = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);

  try {
    const r = await fetch(RAILWAY_URL + '/auth', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code, user_id: userId})
    });
    const d = await r.json();
    if (r.ok && d.ok) {
      localStorage.setItem('herald_uid', userId);
      localStorage.setItem('herald_auth', code);
      localStorage.setItem('herald_owner', d.is_owner ? 'true' : 'false');
      authCode = code; isOwner = d.is_owner;
      if (d.name) { userName = d.name; localStorage.setItem('herald_name', d.name); }
      if (d.ai_name) { aiName = d.ai_name; localStorage.setItem('herald_ai_name', d.ai_name); }
      showApp();
    } else {
      errEl.textContent = d.error || 'Invalid code';
    }
  } catch (e) {
    errEl.textContent = 'Connection error — backend is up but WebView may need restart';
    debugEl.innerHTML = `<a href="${RAILWAY_URL}/health" target="_blank">Health check OK</a>`;
  }
}

function showApp() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('onboardScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  document.getElementById('headerSub').textContent = `PERSONAL AI ${VERSION}`;
  checkInstallPrompt();
  fetchGreeting();
}

// Add all your other functions from the original file here (onboarding, sendToHerald, etc.)
// For brevity I stopped here — paste the rest of your original <script> functions below this line if needed.
// The critical submitCode fix is above.

</script>
</body>
</html>
